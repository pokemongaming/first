<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mega Abomasnow IV Chart</title>
<style>
  table {
    border-collapse: collapse;
    width: 100%;
    max-width: 1200px;
  }
  th, td {
    border: 1px solid #333;
    padding: 5px 8px;
    text-align: center;
  }
  th {
    background-color: #f2f2f2;
  }
  tbody tr:nth-child(even) {
    background-color: #fafafa;
  }
</style>
</head>
<body>

<h2>Mega Abomasnow IV Chart</h2>
<table id="iv-chart">
  <thead>
    <tr>
      <th>Attack</th>
      <th>Defense</th>
      <th>Stamina</th>
      <th>CP (Raid)</th>
      <th>CP (Weather Boost)</th>
      <th>CP (Max)</th>
    </tr>
  </thead>
  <tbody>
    <!-- Rows will be generated by JavaScript -->
  </tbody>
</table>

<script>
// Function to calculate CP (simplified example formula)
// In Pokémon GO, CP depends on Base Stats, IVs, Level, and CP multiplier
// These numbers are approximate placeholders; replace with exact formulas if available
function calculateCP(baseAtk, baseDef, baseSta, ivAtk, ivDef, ivSta, levelMultiplier) {
  const atk = baseAtk + ivAtk;
  const def = Math.sqrt(baseDef + ivDef);
  const sta = Math.sqrt(baseSta + ivSta);
  return Math.floor((atk * def * sta * Math.pow(levelMultiplier, 2)) / 10);
}

// Base stats for Mega Abomasnow (example values, adjust if needed)
const baseAtk = 92;
const baseDef = 122;
const baseSta = 137;

// Example multipliers for Raid, Weather, Max (replace with real multipliers)
const multipliers = {
  raid: 0.79,          // typical level 20 raid catch
  weather: 0.97,       // weather boosted
  max: 1.5             // max powered-up level
};

// Generate the table
const tbody = document.querySelector('#iv-chart tbody');
for (let atk = 0; atk <= 15; atk++) {
  for (let def = 0; def <= 15; def++) {
    for (let sta = 0; sta <= 15; sta++) {
      const cpRaid = calculateCP(baseAtk, baseDef, baseSta, atk, def, sta, multipliers.raid);
      const cpWeather = calculateCP(baseAtk, baseDef, baseSta, atk, def, sta, multipliers.weather);
      const cpMax = calculateCP(baseAtk, baseDef, baseSta, atk, def, sta, multipliers.max);
      
      const row = `<tr>
        <td>${atk}</td>
        <td>${def}</td>
        <td>${sta}</td>
        <td>${cpRaid}</td>
        <td>${cpWeather}</td>
        <td>${cpMax}</td>
      </tr>`;
      tbody.insertAdjacentHTML('beforeend', row);
    }
  }
}
</script>

</body>
</html>
